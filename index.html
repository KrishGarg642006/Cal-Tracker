<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Krish's Tracker</title>
    <style>
        :root { --primary: #27ae60; --bg: #f4f7f6; --tab-bg: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Tab Navigation */
        .tab-bar { display: flex; background: var(--tab-bg); border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-size: 0.8rem; font-weight: bold; color: #7f8c8d; cursor: pointer; }
        .tab-btn.active { color: var(--primary); }

        /* Content Areas */
        .content { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .content.active { display: block; }

        /* UI Elements */
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .progress-bg { background: #eee; border-radius: 10px; height: 10px; overflow: hidden; margin: 15px 0; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin: 10px 0; box-sizing: border-box; font-size: 1rem; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; }
        
        .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .history-row { display: flex; justify-content: space-between; padding: 15px; background: white; border-radius: 12px; margin-bottom: 8px; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

    <div id="tab-today" class="content active">
        <div class="card">
            <div class="stat-row">
                <span>Consumed: <span id="disp-total">0</span></span>
                <span>Left: <span id="disp-left">1500</span></span>
            </div>
            <div class="progress-bg"><div id="progress-bar"></div></div>
            <input type="number" id="add-amt" placeholder="Enter calories..." inputmode="decimal">
            <button class="btn-main" onclick="addEntry()">Add Calories</button>
        </div>
        <h3>Today's Log</h3>
        <div id="today-list"></div>
    </div>

    <div id="tab-history" class="content">
        <h3>Last 7 Days</h3>
        <div id="history-list"></div>
    </div>

    <div id="tab-settings" class="content">
        <div class="card">
            <h3>Daily Goal</h3>
            <p>Current: <span id="disp-goal">1500</span> kcal</p>
            <input type="number" id="new-goal" placeholder="Set new goal..." inputmode="decimal">
            <button class="btn-main" style="background:#2c3e50" onclick="updateGoal()">Update Goal</button>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="color:red; background:none; border:none; margin-top:50px; width:100%;">Reset All App Data</button>
    </div>

    <nav class="tab-bar">
        <button class="tab-btn active" onclick="showTab('tab-today', this)">Today</button>
        <button class="tab-btn" onclick="showTab('tab-history', this)">History</button>
        <button class="tab-btn" onclick="showTab('tab-settings', this)">Settings</button>
    </nav>

    <script>
        // Data Structures
        let data = JSON.parse(localStorage.getItem('calData')) || {
            goal: 1500,
            today: [],
            history: [], // Array of {date: '...', total: 0}
            lastDate: new Date().toLocaleDateString()
        };

        function showTab(tabId, btn) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            if(tabId === 'tab-history') renderHistory();
        }

        function checkNewDay() {
            const todayStr = new Date().toLocaleDateString();
            if (data.lastDate !== todayStr) {
                const dayTotal = data.today.reduce((s, i) => s + i.amt, 0);
                if (dayTotal > 0) {
                    data.history.unshift({ date: data.lastDate, total: dayTotal });
                    if (data.history.length > 7) data.history.pop();
                }
                data.today = [];
                data.lastDate = todayStr;
                save();
            }
        }

        function addEntry() {
            const val = parseInt(document.getElementById('add-amt').value);
            if (val > 0) {
                data.today.push({ amt: val, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
                document.getElementById('add-amt').value = '';
                save();
                renderToday();
            }
        }

        function updateGoal() {
            const g = parseInt(document.getElementById('new-goal').value);
            if (g > 0) {
                data.goal = g;
                document.getElementById('new-goal').value = '';
                save();
                renderToday();
                alert("Goal updated!");
            }
        }

        function renderToday() {
            const total = data.today.reduce((s, i) => s + i.amt, 0);
            document.getElementById('disp-total').innerText = total;
            document.getElementById('disp-left').innerText = Math.max(0, data.goal - total);
            document.getElementById('disp-goal').innerText = data.goal;
            document.getElementById('progress-bar').style.width = Math.min(100, (total/data.goal)*100) + '%';
            
            document.getElementById('today-list').innerHTML = data.today.slice().reverse().map(i => `
                <div class="list-item"><span>+ ${i.amt} kcal</span><span style="color:#999">${i.time}</span></div>
            `).join('');
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = data.history.map(h => `
                <div class="history-row">
                    <span>${h.date}</span>
                    <span style="font-weight:bold">${h.total} kcal</span>
                </div>
            `).join('');
        }

        function save() {
            localStorage.setItem('calData', JSON.stringify(data));
        }

        // Init
        checkNewDay();
        renderToday();
    </script>
</body>
</html>
